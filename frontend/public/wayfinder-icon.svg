<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b3daf;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" fill="#0a0a0f"/>
  <g filter="url(#neon)">
    <!-- Compass/Waypoint Symbol -->
    <circle cx="50" cy="50" r="35" fill="none" stroke="url(#glow)" stroke-width="2"/>
    <circle cx="50" cy="50" r="25" fill="none" stroke="url(#glow)" stroke-width="1.5" stroke-dasharray="4 2"/>
    <!-- Cardinal Points -->
    <path d="M50 15 L55 30 L50 25 L45 30 Z" fill="url(#glow)"/>
    <path d="M50 85 L45 70 L50 75 L55 70 Z" fill="url(#glow)"/>
    <path d="M15 50 L30 45 L25 50 L30 55 Z" fill="url(#glow)"/>
    <path d="M85 50 L70 55 L75 50 L70 45 Z" fill="url(#glow)"/>
    <!-- Center Rune -->
    <circle cx="50" cy="50" r="8" fill="url(#glow)"/>
    <circle cx="50" cy="50" r="4" fill="#0a0a0f"/>
  </g>
</svg>
