version: '3.8'

services:
  wayfinder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wayfinder
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      - NODE_ENV=production
      - PORT=8008
      - DATABASE_PATH=/app/data/wayfinder.db
      - UPLOAD_DIR=/app/data/uploads
      - FRONTEND_URL=http://localhost:8008
      # JWT_SECRET will be auto-generated if not provided
      # Uncomment and set for production:
      # - JWT_SECRET=your-super-secure-jwt-secret-here
      - JWT_EXPIRES_IN=7d
      - ALLOWED_ORIGINS=http://localhost:8008
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    volumes:
      # Persist database
      - wayfinder_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8008/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wayfinder_network

volumes:
  wayfinder_data:
    driver: local

networks:
  wayfinder_network:
    driver: bridge
